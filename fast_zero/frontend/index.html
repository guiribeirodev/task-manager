<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Gerencie suas tarefas" />
    <title>OrganizeMyLife - Gerenciador de Tarefas</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <main class="shell">
      
      <!-- AUTH VIEW -->
      <section class="auth-view" id="auth-view">
        <div class="brand-auth">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#3B82F6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
          <h1>OrganizeMyLife</h1>
        </div>
        <div class="auth-panel">
          <div class="tabs">
            <button class="tab is-active" id="login-tab" type="button">Entrar</button>
            <button class="tab" id="register-tab" type="button">Criar conta</button>
          </div>
          <form class="form" id="login-form">
            <label>Email <input autocomplete="email" name="email" required type="email" /></label>
            <label>Senha <input autocomplete="current-password" name="password" required type="password" /></label>
            <button class="primary" type="submit">Entrar</button>
          </form>
          <form class="form is-hidden" id="register-form">
            <label>Nome de usuário <input autocomplete="username" name="username" required /></label>
            <label>Email <input autocomplete="email" name="email" required type="email" /></label>
            <label>Senha <input autocomplete="new-password" minlength="6" name="password" required type="password" /></label>
            <button class="primary" type="submit">Criar conta</button>
          </form>
          <p class="message" id="auth-message"></p>
        </div>
      </section>

      <!-- APP VIEW -->
      <section class="app-view is-hidden" id="app-view">
        <div class="sidebar" id="sidebar">
          <div class="sidebar-brand">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#3B82F6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
            <h2>OrganizeMyLife</h2>
          </div>
          <nav class="nav-menu">
            <a href="#" class="nav-item is-active"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1"></rect><rect x="14" y="3" width="7" height="5" rx="1"></rect><rect x="14" y="12" width="7" height="9" rx="1"></rect><rect x="3" y="16" width="7" height="5" rx="1"></rect></svg> Painel</a>
            <a href="#" class="nav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13"></path><path d="M8 12h13"></path><path d="M8 18h13"></path><path d="M3 6h.01"></path><path d="M3 12h.01"></path><path d="M3 18h.01"></path></svg> Minhas Tarefas</a>
            <a href="#" class="nav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg> Calendário</a>
          </nav>

          <div class="composer-tile">
            <h3>Nova Tarefa</h3>
            <form class="todo-form" id="todo-form">
              <input id="todo-title" name="title" placeholder="Título da tarefa" required />
              <textarea id="todo-description" name="description" placeholder="Descrição" required rows="2"></textarea>
              <select id="todo-state" name="state" style="display:none;">
                <option value="todo" selected>A fazer</option>
              </select>
              <button class="primary" type="submit">Adicionar</button>
            </form>
            <p class="message" id="app-message"></p>
          </div>
        </div>

        <div class="main-col" id="main-col">
          <header class="topbar">
            <div class="header-left">
              <h1 id="greeting">Bom dia, Usuário</h1>
              <p id="summary">Você tem 0 tarefas pendentes hoje.</p>
            </div>
            <div class="header-right">
              <div class="search-box">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input id="filter-title" placeholder="Buscar tarefas..." />
              </div>
              <button class="icon-button" id="theme-toggle" title="Alternar tema">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
              </button>
              <button class="icon-button" id="logout-button" title="Sair"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg></button>
              <div class="avatar"></div>
            </div>
          </header>

          <div class="board" id="board" aria-live="polite">
            <div class="kanban-col">
              <div class="col-header">
                <div class="col-title"><span class="dot bg-blue"></span> A fazer</div>
              </div>
              <div class="col-content" id="col-todo"></div>
            </div>
            <div class="kanban-col">
              <div class="col-header">
                <div class="col-title"><span class="dot bg-yellow"></span> Em andamento</div>
              </div>
              <div class="col-content" id="col-doing"></div>
            </div>
            <div class="kanban-col">
              <div class="col-header">
                <div class="col-title"><span class="dot bg-green"></span> Concluído</div>
              </div>
              <div class="col-content" id="col-done"></div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <template id="todo-template">
      <article class="task-card">
        <div class="card-top">
          <span class="badge"></span>
          <button class="icon-button delete-button" title="Excluir"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>
        </div>
        <input class="todo-title" />
        <textarea class="todo-description" rows="2"></textarea>
        <div class="card-bottom">
          <div class="date-display">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
            <span>Hoje</span>
          </div>
          <div class="actions">
            <select class="todo-state">
              <option value="draft">Rascunho</option>
              <option value="todo">A fazer</option>
              <option value="doing">Em andamento</option>
              <option value="done">Concluído</option>
              <option value="trash">Lixeira</option>
            </select>
            <button class="save-button">Salvar</button>
          </div>
        </div>
      </article>
    </template>
    <script src="/static/app.js" defer></script>
  </body>
</html>
