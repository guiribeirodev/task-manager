services:
  fastzero_database:
    image: postgres:16
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: app_user
      POSTGRES_DB: app_db
      POSTGRES_PASSWORD: app_password
    ports:
      - "5432:5432"

  fastzero_app:
    build:
      context: .
    image: fastzero_app
    entrypoint: ["sh", "./entrypoint.sh"]
    ports:
      - "8000:8000"
    depends_on:
      - fastzero_database
    environment:
      DATABASE_URL: postgresql+psycopg://app_user:app_password@fastzero_database:5432/app_db

  task_manager_bot:
    build:
      context: .
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      API_URL: http://fastzero_app:8000
    depends_on:
      - fastzero_app

volumes:
  pgdata: